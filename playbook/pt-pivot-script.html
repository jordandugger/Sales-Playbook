<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Pivot Script — IFCA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f172a;
  --navy2: #1e293b;
  --bg: #f1f5f9;
  --white: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
  --say-bg: #eff6ff;
  --say-border: #3b82f6;
  --say-label: #1d4ed8;
  --coach-bg: #fefce8;
  --coach-border: #fbbf24;
  --coach-label: #92400e;
  --coach-text: #78350f;
  --rule-bg: #fff1f2;
  --rule-border: #f43f5e;
  --rule-text: #9f1239;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* APP */
#app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 200px; min-width: 200px;
  background: var(--navy);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
}
.sidebar-brand {
  padding: 18px 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
}
.brand-eyebrow {
  font-size: 9px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase;
  color: #475569; margin-bottom: 5px;
}
.brand-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 800;
  color: #f8fafc; line-height: 1.2;
  letter-spacing: -.3px;
}
.brand-sub { font-size: 10.5px; color: #64748b; margin-top: 3px; }
.nav-label {
  font-size: 9px; font-weight: 600;
  letter-spacing: .11em; text-transform: uppercase;
  color: #374151; padding: 14px 16px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 12px 8px 16px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .12s, border-color .12s;
  text-decoration: none;
}
.nav-item:hover { background: rgba(255,255,255,.04); }
.nav-item.active { background: rgba(255,255,255,.06); border-left-color: var(--nc, #3b82f6); }
.nav-dot {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800;
  color: #fff; flex-shrink: 0; background: var(--nc, #3b82f6);
}
.nav-text { flex: 1; overflow: hidden; }
.nav-name { font-size: 12px; font-weight: 500; color: #cbd5e1; white-space: nowrap; }
.nav-sub { font-size: 10px; color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOP BAR */
.topbar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; gap: 12px;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.doc-title {
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--text); letter-spacing: -.2px;
}
.doc-meta { font-size: 11px; color: var(--muted); }
.tabs {
  display: flex; background: var(--bg);
  border-radius: 7px; padding: 3px; gap: 2px;
}
.tab-btn {
  padding: 5px 14px; border: none; background: transparent;
  border-radius: 5px; font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all .12s;
}
.tab-btn.active {
  background: var(--white); color: var(--text);
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
.topbar-right { display: flex; align-items: center; gap: 8px; }
.coach-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border: 1px solid var(--border);
  background: var(--white); border-radius: 6px;
  font-size: 12px; font-weight: 500; color: var(--muted);
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s;
}
.coach-toggle.on { background: var(--coach-bg); border-color: var(--coach-border); color: var(--coach-label); }
.coach-toggle svg { width: 13px; height: 13px; }

/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 20px 24px 60px; }

/* PHASE */
.phase { margin-bottom: 22px; scroll-margin-top: 12px; }
.phase-head {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 18px; border-radius: 9px 9px 0 0; color: white;
}
.phase-badge {
  font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.2); border-radius: 8px; flex-shrink: 0;
}
.phase-info { flex: 1; }
.phase-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.phase-sub { font-size: 10.5px; opacity: .75; margin-top: 2px; }
.phase-body {
  background: var(--white); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 9px 9px;
  padding: 14px 16px; display: flex; flex-direction: column; gap: 11px;
}

/* SAY THIS */
.block-say {
  background: var(--say-bg); border-left: 4px solid var(--say-border);
  border-radius: 0 7px 7px 0; padding: 11px 15px;
}
.say-label {
  font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--say-label); margin-bottom: 8px;
}
.say-text { font-size: 14.5px; line-height: 1.8; color: #1e293b; }
.say-text p { margin-bottom: 9px; }
.say-text p:last-child { margin-bottom: 0; }
.cue { color: #94a3b8; font-style: italic; font-size: 13px; }

/* COACHING NOTE */
.block-coach {
  background: var(--coach-bg); border-left: 4px solid var(--coach-border);
  border-radius: 0 7px 7px 0; padding: 10px 15px;
}
.coach-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.coach-lbl { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--coach-label); }
.coach-body { font-size: 12.5px; line-height: 1.65; color: var(--coach-text); margin-top: 8px; }

/* RULE */
.block-rule {
  background: var(--rule-bg); border-left: 4px solid var(--rule-border);
  border-radius: 0 7px 7px 0; padding: 10px 15px;
}
.rule-lbl { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #be123c; margin-bottom: 6px; }
.rule-body { font-size: 13.5px; line-height: 1.6; color: var(--rule-text); font-weight: 600; }

/* CALCULATOR CUE */
.block-calc { background:#f0fdfa; border-left:4px solid #0d9488; border-radius:0 7px 7px 0; padding:11px 14px; }
.calc-head { display:flex; align-items:flex-start; gap:10px; }
.calc-icon { font-size:18px; flex-shrink:0; line-height:1; }
.calc-info { flex:1; }
.calc-tab { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#0d9488; margin-bottom:3px; }
.calc-action { font-size:13.5px; font-weight:500; color:#134e4a; line-height:1.55; }
.calc-note { font-size:12px; color:#115e59; margin-top:8px; padding-top:8px; border-top:1px solid #99f6e4; line-height:1.5; display:none; }
.sop-mode .calc-note { display:block !important; }
.notes-on .calc-note { display:block !important; }

/* DISCOVERY BLOCK */
.block-disc { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.disc-head { display: flex; align-items: center; gap: 9px; padding: 8px 13px; background: #f8fafc; border-bottom: 1px solid var(--border); }
.disc-num {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800;
  color: #fff; flex-shrink: 0;
}
.disc-lbl { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
.belief-chip {
  font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
}
.disc-body { padding: 12px 13px; display: flex; flex-direction: column; gap: 10px; }

/* SECTION */
.block-sec { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.sec-head { padding: 8px 13px; background: #f8fafc; border-bottom: 1px solid var(--border); }
.sec-lbl { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.sec-body { padding: 12px 13px; }

/* PILLAR */
.block-pillar { border: 1px solid #ddd6fe; border-radius: 8px; overflow: hidden; }
.pillar-head { display: flex; align-items: center; gap: 11px; padding: 10px 13px; background: #f5f3ff; border-bottom: 1px solid #ddd6fe; }
.pillar-num {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
  color: #fff; background: #4338ca; flex-shrink: 0;
}
.pillar-lbl { font-family: 'Syne', sans-serif; font-size: 12.5px; font-weight: 700; color: #3730a3; letter-spacing: -.1px; }
.prob-link { background: #f0fdf4; border-left: 3px solid #22c55e; padding: 7px 13px; }
.prob-tag { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #15803d; margin-bottom: 3px; }
.prob-text { font-size: 12px; color: #166534; font-style: italic; }
.pillar-body { padding: 12px 13px; }

/* OBJECTION */
.block-obj { border: 1px solid #fee2e2; border-radius: 8px; overflow: hidden; }
.obj-head { padding: 8px 13px; background: #fff1f2; border-bottom: 1px solid #fee2e2; }
.obj-lbl { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #be123c; }
.obj-body { padding: 12px 13px; background: white; }

/* SUPPORT CHECK */
.block-support { border: 1px dashed var(--border); border-radius: 8px; padding: 11px 13px; background: #fafafa; }
.support-lbl { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

/* GENERIC TEXT */
.btext { font-size: 14.5px; line-height: 1.8; color: var(--text); }
.btext p { margin-bottom: 9px; }
.btext p:last-child { margin-bottom: 0; }
.btext .cue { color: #94a3b8; font-style: italic; font-size: 13px; }

/* Visibility */
.coach-only { display: none !important; }
.notes-on .coach-only { display: flex !important; }
.notes-on .block-coach { display: block !important; }
.block-coach { display: none; }
.sop-mode .block-coach { display: block; }
.sop-mode .coach-only { display: flex !important; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-eyebrow">IFCA · March 2026</div>
      <div class="brand-title">PT Pivot Script</div>
      <div class="brand-sub">Personal Trainer → Hybrid / Online</div>
    </div>
    <div class="nav-label">Phases</div>
    <nav id="phase-nav"></nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="doc-title">PT Pivot Script</div>
          <div class="doc-meta">Transition Syntax Edition · Cole Gordon 6-Phase Framework</div>
        </div>
        <div class="tabs">
          <button class="tab-btn active" onclick="setMode('quick')">Quick Script</button>
          <button class="tab-btn" onclick="setMode('sop')">Full SOP</button>
        </div>
      </div>
      <div class="topbar-right">
        <button class="coach-toggle" id="coach-btn" onclick="toggleCoaching()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 1v6l3 3"/><circle cx="8" cy="8" r="7"/></svg>
          Coaching Notes
        </button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function fmt(text) {
  if (!text) return '';
  return text.split('\n\n').map(p => {
    const html = p.split('\n').map(line =>
      line.replace(/\[([^\]]+)\]/g, '<span class="cue">[$1]</span>')
    ).join('<br>');
    return `<p>${html}</p>`;
  }).join('');
}

function sayBlock(content, showLabel = true) {
  return `<div class="block-say">
    ${showLabel ? '<div class="say-label">SAY THIS</div>' : ''}
    <div class="say-text">${fmt(content)}</div>
  </div>`;
}

function textBlock(content) {
  return `<div class="btext">${fmt(content)}</div>`;
}

// ─────────────────────────────────────────────────────────
// PHASE DATA
// ─────────────────────────────────────────────────────────
const PHASES = [
  {
    id: 0, name: "Before You Dial", sub: "Mindset & Foundations", color: "#374151",
    blocks: [
      { t: "coach", c: "Internalize these before every PT call. PTs are skeptical buyers — they've heard pitches on the gym floor their entire career and can smell a closer from a mile away. Your certainty in the outcome has to be unshakeable before you dial. If you're not 100% bought in, they won't be either. Review these out loud." },
      { t: "list", label: "THE 4 CLOSER BELIEFS", items: [
        "We've helped over 1,300 in-person trainers make this exact transition. It works.",
        "Every trainer we work with genuinely wants and needs what we offer — the model they're in is already breaking.",
        "I am doing them a favor. The cost of NOT having this conversation is their health, their family time, and their ceiling.",
        "If they say no — it's their loss. My job is to diagnose honestly, not to sell at any cost."
      ]},
      { t: "coach", c: "You are a doctor, not a salesperson. A doctor diagnoses before prescribing. For PTs specifically: don't assume they want to go fully online. They might want hybrid. Don't assume they hate in-person. They might love their morning clients. Your job is to find out what their life is costing them and show them a better path — not to push them toward something that doesn't fit. If they ask about price early: 'Everything we do is customized to your situation — I honestly don't even know yet what the right path looks like for you. Let me ask you a few questions first.'" },
      { t: "beliefs", label: "THE 7 BELIEFS — PT-SPECIFIC CHECKLIST", coach: "For PT Syntax, Beliefs #1 (Pain), #4 (Desire), and #2 (Doubt) are the most critical. PTs have vivid, concrete pain — use it. Discovery blocks 1–3 build Pain. Block 4 builds Desire. Block 6 builds Doubt. The Knife Turn lands all three dimensions simultaneously. Every PT-specific objection (no audience, can't charge online, don't know how to deliver) traces back to Belief #7 — trust the methodology. Your pitch kills all three proactively.", rows: [
        { n: 1, name: "Pain (The Ceiling)", desc: "They believe the in-person model has a hard ceiling — financial, physical, and time-based" },
        { n: 2, name: "Doubt", desc: "They believe they cannot build the online side alone — they've tried or know they'd make expensive mistakes" },
        { n: 3, name: "Cost", desc: "They believe staying put costs more than investing — financially, physically, and for their family" },
        { n: 4, name: "Desire", desc: "They are emotionally connected to what freedom looks like — mornings free, done by 9:30, present for family" },
        { n: 5, name: "Money", desc: "They have resources and are willing to invest in the right system" },
        { n: 6, name: "Support", desc: "Their partner will support the decision — or is already frustrated with the current model" },
        { n: 7, name: "Trust (Methodology)", desc: "IFCA's specific 3-stage path — Affinity Launch → Content → Ads — is the only logical sequence for a trainer starting from a network" },
      ]}
    ]
  },
  {
    id: 1, name: "Open", sub: "≤ 2 MIN", color: "#0d9488",
    blocks: [
      { t: "say", c: `"Hey [Name] — nice to meet you! Whereabouts are you located?"\n[prospect responds]\n\n"Awesome — and have you come across Jordan or Erin before, or did someone refer you over?"\n[prospect responds]` }
    ]
  },
  {
    id: 2, name: "Frame Setting", sub: "", color: "#7c3aed",
    blocks: [
      { t: "coach", c: "This is the most important 30 seconds of the call. The 'I'll tell you if we CAN'T help you' line drops the guard and repositions you from salesperson to trusted advisor — a doctor, not a closer. Wait for a genuine yes before continuing. PTs are skeptical buyers. This frame earns you the call." },
      { t: "say", c: `"Awesome. Well, I pulled up your application and got a 30,000-foot view of where you're at and where you want to go."\n\n"Just so you know how these calls typically work — I'm going to ask you some questions about what's working, what's not, what your current setup looks like, and what your goals are. And if I feel like we can genuinely help you, I'll definitely let you know."\n\n"But if at any point I don't think we're the right fit, I'll tell you that too and point you in the right direction or connect you with someone who might be a better fit."\n\n"Does that sound fair?"\n[Wait for yes — then move forward]` }
    ]
  },
  {
    id: 3, name: "Discovery", sub: "Transition Syntax — 7 Blocks", color: "#1d4ed8",
    blocks: [
      { t: "coach", c: "This is Transition Syntax — not pure Goal or Problem. The PT has an existing in-person business but is trying to BUILD a new online or hybrid model. Pain = the ceiling of the current model, not the absence of a business. Your job: (1) surface the cost of staying trapped, (2) build desire for time and income freedom, and (3) pre-empt all three PT belief breaks — 'no audience,' 'can't charge online,' 'don't know how to deliver' — BEFORE they ever become objections." },
      { t: "opening", c: `"What's the main thing that motivated you to book this call today?"\n[If vague:] "What do you mean by that?" / "Tell me more..."` },
      { t: "block", num: 1, label: "SITUATION — In-Person Reality", belief: "BELIEF #1: PAIN", bc: "#dc2626",
        coach: "Ground them in their current in-person reality. The question about evenings almost always surfaces real emotion — trainers have a deep relationship with how the model owns their time. Let them talk. Their exact words here become your Hamburger Transition language. Write them down.",
        c: `"Walk me through what a typical week looks like right now — how many sessions are you doing, what does your schedule look like?"\n[prospect responds]\n\n"Morning vs. evenings — what does that split look like for you?"\n[prospect responds]\n\n"And ballpark — what does a good month look like income-wise from in-person right now?"\n[prospect responds]` },
      { t: "block", num: 2, label: "WHY NOW / URGENCY", belief: "BELIEF #4: DESIRE", bc: "#16a34a",
        coach: "Something triggered this call. Common PT triggers: new baby or pregnancy, spouse lost job, business going slow, physical wear starting to show, or just seeing the writing on the wall. Find the trigger. This becomes your desire anchor — you'll reference it throughout.",
        c: `"Has anything changed recently that's making this feel more urgent right now? Like, what's the trigger?"\n[prospect responds]\n\n"Tell me more about that..."\n[Dig deeper. Let them feel it.]` },
      { t: "block", num: 3, label: "THE PHYSICAL / TIME CEILING", belief: "BELIEF #1: PAIN (Deeper)", bc: "#dc2626",
        coach: "Unique to PT Syntax — no equivalent in Goal or Problem scripts. Trainers know their body has a shelf life. The cancellation question hits hard because every trainer has felt that zero-income gap. The vacation question shows the model owns their freedom. Don't skip this block.",
        c: `"Let me ask you something — if you maxed out your in-person schedule and ran at full speed for the next 2-3 years... what's the ceiling? What's the best-case scenario income-wise?"\n[prospect responds]\n\n"And to get there — what does your body have to do?"\n[Let them answer]\n\n"What happens when a client cancels? Or you get sick? Or you want to take a week off with your family?"\n[Let them answer]` },
      { t: "block", num: 4, label: "PAINT THE DREAM", belief: "BELIEF #4: DESIRE", bc: "#16a34a",
        coach: "Get them to describe freedom in their own words. Most PTs want: done by 9:30am, check clients from the couch, vacations without guilt, say no to evening clients, be present for family. Write these down word-for-word — this is your Hamburger Transition fuel.",
        c: `"Flip it for me — if you built the online side exactly the way you'd want it... what does a great week actually look like? Walk me through it."\n[prospect responds]\n\n"And beyond the schedule — what does that actually change for you personally?"\n[Get the emotional picture: family, freedom, not leaving home, being present, saying no]` },
      { t: "block", num: 5, label: "FINANCIAL QUALIFIER", belief: "BELIEF #5: MONEY", bc: "#d97706",
        coach: "Trainers almost always anchor low — '$2–3K to start' or 'just replace my evenings.' That's fine as an anchor but push it up during pre-pitch. The '$3K is literally one client' math moment is more powerful when they've already given you the goal number. As they answer, silently enter all four numbers into the PT Pivot Calculator: sessions/week, avg rate, evening sessions, and current monthly income. The Ceiling and COI sections auto-populate.",
        c: `"What would the online piece need to produce monthly for it to feel real — like it's actually changing your life? What's the number that makes you go 'okay, this matters'?"\n[prospect responds]\n\n"Why that number — like what specifically does that change for you?"\n[Let them go deeper. This becomes your desire anchor.]\n\n"And right now, what's your monthly take-home from in-person, roughly?"\n[prospect responds]` },
      { t: "calc", tab:"Enter Their Numbers", action:"Silently fill in the PT Pivot Calculator as they answer Block 5: Sessions/Week, Avg Session Rate, Evening Sessions/Week, Current Monthly Income, Monthly Online Goal. The Ceiling vs Opportunity and Evening Freedom sections auto-calculate — ready to screen share after the Knife Turn.",
        note:"Don't announce it. Just fill it in while they're talking. By the time you hit the Knife Turn, the numbers are waiting on screen." },
      { t: "block", num: 6, label: "SURFACE FEAR & DOUBT", belief: "BELIEF #2: DOUBT", bc: "#7c3aed",
        coach: "This block surfaces the three PT belief breaks: (1) 'I have no audience,' (2) 'I don't know how to deliver without Zoom workouts,' (3) 'I can't charge what I charge in-person online.' Listen carefully — the ones that come up here get addressed directly by name in your pitch.",
        c: `"Have you made any attempts to get the online side going before? What happened?"\n[prospect responds]\n\n"What's your biggest concern about actually making this work?"\n[Let them voice the fear — no audience, tech issues, delivery, pricing, what people will think]` },
      { t: "block", num: 7, label: "THE KNIFE TURN", belief: "BELIEF #3: COST", bc: "#9f1239",
        coach: "Most powerful moment in PT Syntax. Hit all three dimensions at once: financial ceiling + physical toll + family cost. Ask it, then sit completely silent. The weight of their own answer creates urgency — you never have to manufacture it.",
        c: `"I hate to even ask this — but I have to. If you're still doing the same sessions, same hours, same ceiling... two years from now, what does that cost you? Financially. Physically. And for the people waiting for you at home?"\n[Long pause. Let them answer. Let them feel it.]\n\n"Yeah. That's exactly why you booked this call."` },
      { t: "calc", tab:"Ceiling vs Opportunity · Cost of Staying Put", action:"Share your screen NOW. Show the 'Ceiling vs The Opportunity' card — the in-person ceiling number with 20% cancellations factored in, their online goal, and the annual cost of staying put. Let it sit. Don't explain it. Then scroll to 'Evening Freedom Math' if evenings are their silver bullet trigger.",
        note:"Say nothing after you share it. The silence does the work. If they say 'wow' or 'that's a lot' — that's your bridge: 'Yeah. That's exactly why you're here.'" },

  },
  {
    id: 4, name: "Pre-Pitch Coaching", sub: "Three Currencies + The Affinity Launch", color: "#b45309",
    blocks: [
      { t: "coach", c: "This block does TWO jobs before a single pitch word is spoken: (1) it permanently kills the 'I have no audience' objection by reframing their network as their biggest asset, and (2) seeds the exact gap your pitch will solve. The Three Currencies frame + Affinity Launch math on screen = they've already pre-closed themselves before you say a single word about what IFCA does." },
      { t: "sec", label: "THE THREE CURRENCIES",
        c: `"Before I walk you through what we do — let me give you something first, because this is the thing that trips up most trainers when they think about going online."\n\n"There are really only three things you need to get your first online clients. I call them the Three Currencies — and you only need ONE of them to start."\n\n"First: an Audience — social following, email list, content that's already working. Second: Cash — money you can put into paid ads. Third: Your Network — the people who already know you, trained with you, and trust you."\n\n"You've been doing this for [X] years. Which one of those three do you already have the most of?"\n[They will say: network]\n\n"Exactly. And that's actually the most powerful one to start with — because it's warmer than any ad you'll ever run. Your first clients come from people who already respect your expertise. That cash funds content. Content builds your audience. When you have all three running together? That's when it compounds."\n\n"So the thing most trainers think is their biggest weakness — 'I don't have an audience' — that's actually the last thing you need. Does that make sense?"\n[prospect responds]` },
      { t: "calc", tab:"Three Currencies Visual + Affinity Launch Funnel", action:"Share PT Pivot Calculator. Show the Three Currencies diagram — Network node is lit green, Cash and Audience are dimmed. Then scroll to the Affinity Launch funnel: their contacts → expected conversations → calls booked → expected clients → contracted revenue. Say: 'Here's what that actually looks like with your numbers — this is before we run a single ad.'",
        note:"Let them read the numbers. Most trainers get quiet here in a good way. If they say 'I didn't realize I had that many people...' — that's the exact moment you move to the Two Keys." },
      { t: "sec", label: "THE TWO KEYS + MATH MOMENT",
        c: `"It really comes down to two things. A desirable, scalable offer — not 'I sell online personal training,' but a specific result for a specific person with a specific method. And a system to get clients for that offer consistently. That's it."\n\n"In terms of your offer — do you have an idea of what that looks like? Like, who it's for, what problem it specifically solves, and how you'd deliver it without just doing Zoom sessions all day?"\n[prospect responds]\n\n"And what are you thinking of charging for it?"\n[If low or no offer:] "Most of our trainers start at $3,000 for a 6-month package — that's $500 a month. To hit [their stated goal], you'd only need [X] clients. Does that math change how you're thinking about this?"` },
      { t: "calc", tab:"Clients Needed to Hit Goal", action:"Show the 'Clients Needed' hero number. 'At $3,000 per package, here's literally how many active clients you need to hit [their goal]. Does that number feel more doable than you expected?'",
        note:"If their goal was low, challenge it now: 'Look — to hit $6K instead of $4K, you only need one more client. Want to use $6K as the real target?' Update the calculator live and let them see the number barely move. This is where you upgrade their ambition before the pitch." }

  {
    id: 5, name: "Hamburger Transition", sub: "", color: "#15803d",
    blocks: [
      { t: "coach", c: "Use their EXACT words from discovery — not paraphrases. If they said 'I just want to be done by 9:30,' say that back verbatim. If they said 'I can't keep doing evenings,' say that. This is the moment they feel genuinely understood — don't generalize it away. Also note: reference the 1,300+ PT-specific success stories here — it builds instant credibility with this avatar." },
      { t: "say", c: `"Well [Name], based on everything you've shared — I think what I have going on here could be a really good fit for you..."\n\n"...because you know how earlier you mentioned [recap their #1 pain/desire in their EXACT words]..."\n[prospect: yeah, exactly]\n\n"Our whole thing at IFCA is a proven four-step process to get you from where you are right now — trading time for money in-person — to a hybrid or fully online business running $5K, $10K, even $15K months, in about six months. We've done this specifically with over 1,300 in-person trainers who were exactly where you are."\n\n"Instead of spending months trying to piece this together alone and making every mistake in the book — we just help you build it right from day one. Make sense?"\n[prospect: yes]\n\n"Cool — where do you want to go from here? I can walk you through exactly how we do that, A to Z. But you tell me."\n[They will say: walk me through it]\n\n"Perfect. Grab a pen and write down 1 through 4 with some space between each."` }

  {
    id: 6, name: "The Pitch", sub: "4 Client Engine Pillars", color: "#4338ca",
    blocks: [
      { t: "coach", c: "For PT Syntax, use Problem Linking on every pillar — especially 1 and 3, which are the belief-breaking moments. After EVERY pillar: 'Does that make sense? What are your thoughts on that?' — wait for their actual response before moving on. Don't stack pillars without pausing. The pitch is a conversation, not a presentation." },
      { t: "sec", label: "HIGH LEVEL PROMISE",
        c: `"Before I walk you through the four things — the moment you enroll, the first thing we do is pair you with a 1-on-1 Success Coach who's already built a six or seven-figure fitness coaching business themselves. Half our coaching team has gone through this exact in-person to online transition — so you'll be paired with someone who's been exactly where you are."\n\n"Everything I'm about to walk you through gets shaped and personalized by them. Here's what I think it looks like for you specifically..."` },
      { t: "pillar", num: 1, label: "AI OFFER OPTIMIZATION",
        link: "You mentioned you weren't sure how to position yourself online or what you can even charge.",
        c: `"Number one — AI Offer Optimization."\n\n"Here's what most trainers do when they try to go online: they just offer 'online personal training.' Same thing they've been doing, just delivered differently. And the problem is it's a complete commodity — there are thousands of coaches selling that for $99 a month. You blend in entirely."\n\n"What we do instead: your Success Coach sits down with you 1-on-1 using our AI Offer Optimizer. We figure out exactly who your dream client is, what specific result they want to buy, and how to position your offer so that when they find you, they think: 'That's exactly what I need — and I need it from this person specifically.'"\n\n"Here's the difference in practice. 'I sell online personal training' — $149 a month. 'I help [specific person] achieve [specific result] through [your named method]' — $3,000 for a 6-month package. Same service. Completely different offer."\n\n"For most trainers, figuring this out takes months of trial and error. You get it done in 48 hours."\n\n"Does that make sense? What are your thoughts on that?"\n[Wait for response before moving to Pillar 2]` },
      { t: "pillar", num: 2, label: "DONE-FOR-YOU LEAD ENGINE",
        link: "You mentioned you've never really had to market — your clients have always come from the gym floor or referrals.",
        c: `"Number two — the Done-For-You Lead Generation Engine. And this is the one I want to walk you through carefully, because it's where most trainers get this completely wrong."\n\n"There are three stages. We go in this order — and the order is what makes it work."\n\n"Stage one: The Affinity Launch. Before we run a single ad, we run a structured warm outreach campaign to the people who already trust you. Not cold messaging — this is a specific conversation framework that feels completely natural. You're not pitching anyone. You're reconnecting, asking good questions, and when the time is right, mentioning what you've built. Out of every 100 people you reach out to, typically 3 to 7 become paying clients. At $3,000 a package, that's $9,000 to $21,000 from contacts already sitting in your phone — before you've spent a dollar on ads."\n\n"Stage two: AI Content System. While the Affinity Launch is running, we install your AI content system — we call her Lexi. She plugs in your exact offer, analyzes what's already working in your market, and gives you ready-to-execute content creatives. You're not staring at a blank screen. You're not guessing. Now one of two things happens — and both are wins. Either your content starts converting and you're generating inbound leads without spending a dollar on ads. Or it's warming your audience while your Affinity Launch is closing clients. You're winning either way."\n\n"Stage three: Paid Amplification. Once your offer is proven — you have clients, you have results, you have content that converts — that's when we layer in ads. Not before. Because the biggest mistake coaches make is spending money on ads before they know what works. By the time we turn ads on, we know exactly what message lands. And we even cover your first month of ad spend."\n\n"Network first. Content to test what converts. Ads to amplify what's proven. That's the order — and that's why it works when everything else fails."\n\n"Does that make sense? What are your thoughts on that?"\n[Wait for response]` },
      { t: "coach", c: "Preempt the 'I don't want to cold message people' objection proactively — don't wait for it. If they seem hesitant during this pillar, or if they said something about hating spam or DMs in discovery, say: 'I want to be clear — this isn't cold messaging. These are people who already know your face, know your work, trust your expertise. We're not asking you to pitch strangers. We're giving you a conversation framework that turns existing trust into a natural conversation — and in some cases they'll just say they've been waiting to work with you.'" },
      { t: "calc", tab:"Affinity Launch Funnel + Pipeline Math", action:"Show the Affinity Launch funnel in the PT Calculator — contacts → expected clients → contracted revenue. 'This is Stage 1 — zero ad spend. Then scroll to the Pipeline Math section to show how Stage 3 ads work: leads needed, call volume, ad spend. 'And when we eventually get here, look at what it costs to run ads versus what you're making back.'",
        note:"Keep the calc brief — you're supporting the pitch, not presenting a report. Point to the Affinity Launch revenue number: 'That's from people already in your phone.' Then point to the ad ROAS: 'And this is what happens once we turn on ads with a proven offer.' Let both numbers sit." },
      { t: "pillar", num: 3, label: "IMPACT AI BUSINESS MANAGER",
        link: "You mentioned you weren't sure how to deliver coaching online without just doing Zoom sessions all day.",
        c: `"Number three — and I want to spend a second on this, because I know it's the one trainers worry about most."\n\n"Most trainers think going online means doing Zoom workouts all day. Here's the truth: the best online coaching is NOT Zoom workouts. It's actually more accountable than in-person — because your client has you in their pocket 24/7, not just for an hour three times a week."\n\n"Here's how delivery actually works: your client gets a professional app with their personalized program, video demos for every exercise, and a weekly check-in system. You respond to their check-ins via short Loom videos — from your couch. No more showing someone how to do a Romanian deadlift for the 400th time. One Loom video, done."\n\n"The Impact AI Business Manager is the infrastructure that runs all of this — program delivery, your CRM, scheduling, lead follow-up, automated text sequences when someone applies. One platform that replaces 5 to 7 separate apps."\n\n"$1 a month while you're in the program. Saves you $300 to $1,000 from day one."\n\n"Does that make sense? What are your thoughts?"\n[Wait for response]` },
      { t: "pillar", num: 4, label: "CONVERSION + RETENTION",
        link: "You mentioned wanting to keep some in-person — and your existing clients are actually your easiest first online clients.",
        c: `"Number four — the Conversion and Retention System. Two parts."\n\n"Part one: closing. Average coaches starting out close 10 to 20% of their calls. Our coaches close 30 to 50%. You get proven DM and sales call scripts built specifically for fitness coaches, plus unlimited 1-on-1 call reviews — our coaches listen to your actual recorded calls and tell you exactly what to say and where you're losing people."\n\n"Part two: retention. Here's something most trainers don't think about — your current in-person clients who transition online become some of your most loyal long-term online clients. With the right conversation, a $400/month in-person client becomes a $350/month online client that takes 20 minutes a week instead of 4 hours."\n\n"Our LTV Retention System keeps clients for an average of 17-plus months. Ten clients at $3K a package — at 17-month retention, each client is worth $8K-plus in lifetime value. That's a predictable, compounding business."\n\n"Does that make sense? What are your thoughts?"\n[Wait for response]` },
      { t: "sec", label: "DELIVERY RECAP",
        c: `"One quick thing — do you have any system right now to deliver programs and track clients online?"\n[If no:] "Perfect — we set you up with Trainerized. Pre-built for fitness coaches, completely done for you."\n\n"So to recap: your offer positioned so you stand out and charge premium. First clients from your Affinity Launch — the people who already trust you, zero ad spend. Then content that tests what converts. Then ads to amplify what's proven, and we cover month one. One platform that replaces all your apps and delivers programs professionally. And a sales and retention system that closes 30 to 50% of calls and keeps clients 17-plus months."\n\n"Everything is customized to your situation. Your onboarding call with your Success Coach maps out your complete 6-month plan — what we do for you, what we need from you, and in what order. Zero guesswork."\n\n"Does that sound good?"\n[If they hesitate, surface the concern NOW before moving to price]` }

    blocks: [
      { t: "sec", label: "TEMP CHECK",
        c: `"How do you feel about the process specifically? Do you feel like this is what you need to make this transition happen?"\n[If yes → move to next steps]\n[If hesitant:] "On a scale of 1 to 10 — where do you fall in terms of alignment with what we do?"\n[If less than 8:] "What would make it a 10 for you?"\n[Surface the hidden objection NOW — before the price]` },
      { t: "calc", tab:"12-Month Hybrid Trajectory", action:"Show the 12-Month Hybrid Trajectory chart. Two lines: Hybrid (online + in-person, green) vs In-Person Only (amber, flat). Dashed vertical lines mark when online covers evenings and when it covers full in-person income. Say: 'Let me show you what the next 12 months looks like if we do this.' Then go silent. Let both lines sit on screen. The gap between them is the entire argument.",
        note:"Don't narrate the graph. Just say the one sentence and go quiet. If they ask 'is that realistic?' — point to Stage 1: 'Month 1 is literally just your network. We've shown you the math already. Everything after that is just the system running.' Then drop the price." },
      { t: "rule", c: "After you drop the price — STOP. Complete silence. The first person to speak loses the momentum. Every single time, no exceptions. Do not fill the silence. Do not add qualifiers. Let them respond first." },
      { t: "sec", label: "PRICE DROP",
        c: `"So basically next steps — you process the investment with me today, we get your onboarding call scheduled, and you'll have complete clarity on everything that happens over the next six months. Does that sound good?"\n[wait for yes]\n\n"And the investment is just [PRICE]."\n[STOP. Silence. Let them speak first.]` },
      { t: "sec", label: "STALL CLOSE",

    id: 8, name: "Objection Handling", sub: "", color: "#374151",
    blocks: [
      { t: "rule", c: "Run the Master Sequence FIRST on every objection before going to a specific handle. Never book a follow-up for a fear-based objection — close it on the call. Complaints ≠ objections. Don't handle complaints." },
      { t: "sec", label: "MASTER SEQUENCE — RUN FIRST",
        c: `"[Objection] aside — do you feel this is exactly what you need to make this transition?"\n"So you're 100% in on the process... it's just a matter of solving [objection], and then you're ready to move forward. Is that right?"\n[Now you're problem-solving together — not fighting]` },
      { t: "obj", label: "PT-SPECIFIC: 'I DON'T HAVE AN AUDIENCE'",
        c: `"Good — you don't need one to start. And I mean that literally."\n\n"Your first clients don't come from an audience. They come from your network — the people who've trained with you, worked out near you, watched you coach for years. Those people already trust you. We call it the Affinity Launch — it's a structured outreach campaign to your existing contacts using a conversation framework that feels completely natural. Not pitching. Not cold DMs. Just reconnecting with people who already respect your work."\n\n"Out of every 100 contacts, we typically see 3 to 7 clients sign. At $3,000 a package, that's up to $21,000 from people already in your phone — before we've touched ads."\n\n"The audience is the last thing we build. The network is where we start. You've already got the most important currency."` },
      { t: "obj", label: "PT-SPECIFIC: 'I DON'T KNOW HOW TO DELIVER ONLINE'",
        c: `"That's exactly why Pillar 3 exists. The Impact Business Manager is set up for you in your first week — you get a dedicated 1-on-1 tech onboarding call. No Zoom workouts. Your clients get a professional app. You respond to check-ins from your phone. You don't figure out a single thing alone."\n\n"How tech-savvy do you need to be to use an app on your phone?"` },

        c: `"Nobody's asking you to — that's the whole point of the hybrid model. You keep the in-person clients you love, especially your morning people. What we're building is the online side that replaces the evenings and adds a second income stream.\n\n"At worst, you end up with both. At best, the online grows to where you have real choices. Either way, you win."` },

      { t: "obj", label: "'I NEED TO THINK ABOUT IT'",

// RENDER FUNCTIONS

function renderBlock(b, phaseColor) {
  switch(b.t) {
    case 'say':
      return `<div class="block-say"><div class="say-label">SAY THIS</div><div class="say-text">${fmt(b.c)}</div></div>`;

    case 'coach':
      return `<div class="block-coach"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.c}</div></div>`;

    case 'rule':
      return `<div class="block-rule"><div class="rule-lbl">⚠ RULE</div><div class="rule-body">${b.c}</div></div>`;

    case 'calc':
      return `<div class="block-calc">
        <div class="calc-head">
          <span class="calc-icon">📊</span>
          <div class="calc-info">
            <div class="calc-tab">PT Pivot Calculator → ${b.tab}</div>
            <div class="calc-action">${b.action}</div>
          </div>
        </div>
        ${b.note ? `<div class="calc-note">${b.note}</div>` : ''}
      </div>`;

    case 'opening':
      return `<div class="block-sec">
        <div class="sec-head"><div class="sec-lbl">Opening Question</div></div>
        <div class="sec-body">${sayBlock(b.c, false)}</div>
      </div>`;

    case 'block':
      const chipStyle = `background:${b.bc}18;color:${b.bc}`;
      return `<div class="block-disc">
        <div class="disc-head">
          <div class="disc-num" style="background:${phaseColor}">${b.num}</div>
          <div class="disc-lbl">${b.label}</div>
          <span class="belief-chip" style="${chipStyle}">${b.belief}</span>
        </div>
        <div class="disc-body">
          ${b.coach ? `<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.coach}</div></div>` : ''}
          ${sayBlock(b.c, false)}
        </div>
      </div>`;

    case 'support':
      return `<div class="block-support">
        <div class="support-lbl">Support Check</div>
        <div class="btext">${fmt(b.c)}</div>
      </div>`;

    case 'sec':
      return `<div class="block-sec">
        <div class="sec-head"><div class="sec-lbl">${b.label}</div></div>
        <div class="sec-body">${sayBlock(b.c, false)}</div>
      </div>`;

    case 'pillar':
      return `<div class="block-pillar">
        <div class="pillar-head">
          <div class="pillar-num">${b.num}</div>
          <div class="pillar-lbl">${b.label}</div>
        </div>
        <div class="prob-link">
          <div class="prob-tag">Problem Link</div>
          <div class="prob-text">${b.link}</div>
        </div>
        <div class="pillar-body">${sayBlock(b.c, false)}</div>
      </div>`;

    case 'obj':
      return `<div class="block-obj">
        <div class="obj-head"><div class="obj-lbl">${b.label}</div></div>
        <div class="obj-body">${sayBlock(b.c, false)}</div>
      </div>`;

    default: return '';
  }
}

function renderNav() {
  document.getElementById('phase-nav').innerHTML = PHASES.map(p =>
    `<div class="nav-item" id="nav-${p.id}" style="--nc:${p.color}" onclick="jumpTo(${p.id})">
      <div class="nav-dot" style="background:${p.color}">${p.id}</div>
      <div class="nav-text">
        <div class="nav-name">${p.name}</div>
        ${p.sub ? `<div class="nav-sub">${p.sub}</div>` : ''}
      </div>
    </div>`
  ).join('');
}

function renderContent() {
  document.getElementById('content').innerHTML = PHASES.map(p =>
    `<div class="phase" id="phase-${p.id}">
      <div class="phase-head" style="background:${p.color}">
        <div class="phase-badge">${p.id}</div>
        <div class="phase-info">
          <div class="phase-name">${p.name}</div>
          ${p.sub ? `<div class="phase-sub">${p.sub}</div>` : ''}
        </div>
      </div>
      <div class="phase-body">
        ${p.blocks.map(b => renderBlock(b, p.color)).join('')}
      </div>
    </div>`
  ).join('');
}

// STATE & EVENTS
// ─────────────────────────────────────────────────────────
let mode = 'quick';
let coaching = false;

function applyClasses() {
  const body = document.body;
  body.classList.toggle('sop-mode', mode === 'sop');
  body.classList.toggle('notes-on', coaching);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && m === 'quick') || (i === 1 && m === 'sop'));
  });
  if (m === 'quick') { coaching = false; document.getElementById('coach-btn').classList.remove('on'); }
  applyClasses();
}

function toggleCoaching() {
  if (mode === 'quick') { setMode('sop'); return; }
  coaching = !coaching;
  document.getElementById('coach-btn').classList.toggle('on', coaching);
  applyClasses();
}

function jumpTo(id) {
  const el = document.getElementById(`phase-${id}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`nav-${id}`).classList.add('active');
}

// Track scroll to update active nav
document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('content');
  content.addEventListener('scroll', () => {
    let active = 0;
    PHASES.forEach(p => {
      const el = document.getElementById(`phase-${p.id}`);
      if (el && el.offsetTop - 40 <= content.scrollTop) active = p.id;
    });
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const an = document.getElementById(`nav-${active}`);
    if (an) { an.classList.add('active'); an.scrollIntoView({ block: 'nearest' }); }
  });
});

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
renderNav();
renderContent();
document.getElementById('nav-0').classList.add('active');
</script>
</body>
</html>
